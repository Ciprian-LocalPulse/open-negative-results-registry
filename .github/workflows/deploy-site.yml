name: Deploy Site

# Rebuilds site/data_index.json from the current data/ contents and
# publishes site/ to GitHub Pages on every push to main. Keeps the
# static search interface in sync with the dataset without a backend.

on:
  push:
    branches: [main]
    paths:
      - "data/**/*.json"
      - "site/**"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/generate_search_index.py
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
